entity.pantheon_document_collection.collection:
  path: '/admin/structure/pantheon-content-publisher-collection'
  defaults:
    _entity_list: 'pantheon_document_collection'
    _title: 'Pantheon content publisher collection configuration'
  requirements:
    _permission: 'administer pantheon_document_collection'

entity.pantheon_document_collection.add_form:
  path: '/admin/structure/pantheon_document_collection/add'
  defaults:
    _entity_form: 'pantheon_document_collection.add'
    _title: 'Add a pantheon content publisher collection'
  requirements:
    _permission: 'administer pantheon_document_collection'

entity.pantheon_document_collection.edit_form:
  path: '/admin/structure/pantheon-content-publisher-collection/{pantheon_document_collection}'
  defaults:
    _entity_form: 'pantheon_document_collection.edit'
    _title: 'Edit a pantheon content publisher collection'
  requirements:
    _permission: 'administer pantheon_document_collection'

entity.pantheon_document_collection.delete_form:
  path: '/admin/structure/pantheon-content-publisher-collection/{pantheon_document_collection}/delete'
  defaults:
    _entity_form: 'pantheon_document_collection.delete'
    _title: 'Delete a pantheon content publisher collection'
  requirements:
    _permission: 'administer pantheon_document_collection'

pantheon_document.webhook:
  path: '/pantheon_document/webhook'
  defaults:
    _controller: '\Drupal\pantheon_content_publisher\Controller\PantheonContentPublisherController::webhook'
  requirements:
    _access: 'TRUE'

pantheon_document.status:
  path: '/api/pantheoncloud/status'
  defaults:
    _controller: '\Drupal\pantheon_content_publisher\Controller\PantheonContentPublisherController::status'
  requirements:
    _access: 'TRUE'


pantheon_document.view:
  path: '/api/pantheoncloud/document/{pantheon_id}'
  defaults:
    _controller: '\Drupal\pantheon_content_publisher\Controller\PantheonContentPublisherViewController::pantheonView'
  requirements:
    _access: 'TRUE'
