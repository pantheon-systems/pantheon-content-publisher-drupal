entity.pantheon_document_collection.collection:
  path: '/admin/structure/pantheon-content-publisher-collection'
  defaults:
    _entity_list: 'pantheon_document_collection'
    _title: 'Pantheon Content Publisher collections'
  requirements:
    _permission: 'administer pantheon_document_collection'

entity.pantheon_document_collection.add_form:
  path: '/admin/structure/pantheon_document_collection/add'
  defaults:
    _entity_form: 'pantheon_document_collection.add'
    _title: 'Add a pantheon content publisher collection'
  requirements:
    _permission: 'administer pantheon_document_collection'

entity.pantheon_document_collection.edit_form:
  path: '/admin/structure/pantheon-content-publisher-collection/{pantheon_document_collection}'
  defaults:
    _entity_form: 'pantheon_document_collection.edit'
    _title: 'Edit a pantheon content publisher collection'
  requirements:
    _permission: 'administer pantheon_document_collection'

entity.pantheon_document_collection.delete_form:
  path: '/admin/structure/pantheon-content-publisher-collection/{pantheon_document_collection}/delete'
  defaults:
    _entity_form: 'pantheon_document_collection.delete'
    _title: 'Delete a pantheon content publisher collection'
  requirements:
    _permission: 'administer pantheon_document_collection'

pantheon_content_publisher.webhook:
  path: '/api/pantheoncloud/webhook'
  defaults:
    _controller: '\Drupal\pantheon_content_publisher\Controller\PantheonContentPublisherController::webhook'
  requirements:
    _access: 'TRUE'

pantheon_content_publisher.status:
  path: '/api/pantheoncloud/status'
  defaults:
    _controller: '\Drupal\pantheon_content_publisher\Controller\PantheonContentPublisherController::status'
  requirements:
    _access: 'TRUE'


pantheon_document.view:
  path: '/api/pantheoncloud/document/{pantheon_id}'
  defaults:
    _controller: '\Drupal\pantheon_content_publisher\Controller\PantheonContentPublisherViewController::pantheonView'
  requirements:
    _access: 'TRUE'

entity.pantheon_smart_component.collection:
  path: '/admin/structure/pantheon-smart-component'
  defaults:
    _entity_list: 'pantheon_smart_component'
    _title: 'Pantheon smart component configuration'
  requirements:
    _permission: 'administer pantheon_smart_component'

entity.pantheon_smart_component.add_form:
  path: '/admin/structure/pantheon_smart_component/add'
  defaults:
    _entity_form: 'pantheon_smart_component.add'
    _title: 'Add a pantheon smart component'
  requirements:
    _permission: 'administer pantheon_smart_component'

entity.pantheon_smart_component.edit_form:
  path: '/admin/structure/pantheon-smart-component/{pantheon_smart_component}'
  defaults:
    _entity_form: 'pantheon_smart_component.edit'
    _title: 'Edit a pantheon smart component'
  requirements:
    _permission: 'administer pantheon_smart_component'

entity.pantheon_smart_component.delete_form:
  path: '/admin/structure/pantheon-smart-component/{pantheon_smart_component}/delete'
  defaults:
    _entity_form: 'pantheon_smart_component.delete'
    _title: 'Delete a pantheon smart component'
  requirements:
    _permission: 'administer pantheon_smart_component'

pantheon_smart_component.schema:
  path: '/api/pantheoncloud/component_schema'
  defaults:
    _controller: '\Drupal\pantheon_content_publisher\Controller\PantheonSmartComponentController::listComponents'
  requirements:
    _access: 'TRUE'

pantheon_smart_component.schema.component:
  path: '/api/pantheoncloud/component_schema/{pantheon_smart_component}'
  defaults:
    _controller: '\Drupal\pantheon_content_publisher\Controller\PantheonSmartComponentController::listComponents'
  requirements:
    _access: 'TRUE'

pantheon_smart_component.view:
  path: '/api/pantheoncloud/component/{component}'
  defaults:
    _controller: '\Drupal\pantheon_content_publisher\Controller\PantheonSmartComponentController::viewSmartComponent'
  requirements:
    _access: 'TRUE'
